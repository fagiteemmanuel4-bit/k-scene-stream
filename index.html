<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>K·Scene — Premium K-Drama Streaming</title>
    <meta
      name="description"
      content="Stream the latest K-Dramas and K-Pop content ad-free with native high-quality playback."
    />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF2E50" />
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition:
          opacity 0.5s ease-out,
          visibility 0.5s;
      }
      .rabbit-logo {
        width: 120px;
        height: 120px;
        animation: pulse 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.8;
        }
      }
      .loading-bar {
        width: 200px;
        height: 4px;
        background: #f0f0f0;
        border-radius: 10px;
        margin-top: 40px;
        overflow: hidden;
      }
      .loading-progress {
        width: 0%;
        height: 100%;
        background: #ff2e50;
        animation: load 2s forwards ease-in-out;
      }
      @keyframes load {
        0% {
          width: 0%;
        }
        100% {
          width: 100%;
        }
      }
      .brand-name {
        margin-top: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 24px;
        letter-spacing: -1px;
        color: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/logo.svg" class="rabbit-logo" alt="logo" />
      <div class="brand-name">K·SCENE</div>
      <div class="loading-bar">
        <div class="loading-progress"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener("load", () => {
        setTimeout(() => {
          const splash = document.getElementById("splash");
          splash.style.opacity = "0";
          splash.style.visibility = "hidden";
        }, 2000);
      });
    </script>
  </body>
</html>
